<script>
  (function () {
    function getTarget(hash) {
      if (!hash || hash.charAt(0) !== "#") {
        return null;
      }

      var id = hash.slice(1);
      return document.getElementById(id) || document.getElementById(decodeURIComponent(id));
    }

    function getFixedOffset() {
      var topBar = document.getElementById("top-bar");
      var topBarHeight = topBar ? topBar.getBoundingClientRect().height : 0;
      return Math.ceil(topBarHeight) + 16;
    }

    function scrollToHash(hash, pushToHistory) {
      var target = getTarget(hash);

      if (!target) {
        return false;
      }

      var top = window.pageYOffset + target.getBoundingClientRect().top - getFixedOffset();
      window.scrollTo({ top: Math.max(top, 0), left: 0, behavior: "auto" });

      if (pushToHistory) {
        history.pushState({}, document.title, window.location.pathname + hash);
      }

      return true;
    }

    document.addEventListener(
      "click",
      function (event) {
        var link = event.target.closest("a[href^='#']");

        if (!link) {
          return;
        }

        var href = link.getAttribute("href");

        if (!href || href === "#") {
          return;
        }

        if (!scrollToHash(href, true)) {
          return;
        }

        event.preventDefault();
        event.stopImmediatePropagation();
      },
      true,
    );

    jQuery(function () {
      // Disable the theme's animated hash scrolling so anchors use one stable offset.
      jQuery(window).off("hashchange");
      jQuery("body").off("click", "a");

      if (window.location.hash) {
        window.requestAnimationFrame(function () {
          scrollToHash(window.location.hash, false);
        });
      }
    });

    window.addEventListener("load", function () {
      if (window.location.hash) {
        window.requestAnimationFrame(function () {
          scrollToHash(window.location.hash, false);
        });
      }
    });

    window.addEventListener("hashchange", function () {
      scrollToHash(window.location.hash, false);
    });
  })();
